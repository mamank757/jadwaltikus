<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Pengendalian - BPP Bola</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { 
      --bg-body: #121212; --bg-card: #1e1e1e; --bg-input: #2d2d2d;
      --text-main: #e0e0e0; --text-muted: #a0a0a0; --border-color: #333333; --primary: #81c784;
    }
    body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); margin: 0; padding: 15px; color: var(--text-main); }
    .container { max-width: 850px; margin: auto; }
    
    .btn-home {
  position: left;
  bottom: 25px;
  right: 20px;
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-decoration: none;
  font-size: 24px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  z-index: 9999;
  border: 2px solid white;
  transition: 0.2s;
}

.btn-home:active {
  transform: scale(0.9);
}

    .main-header { text-align: center; margin-bottom: 25px; padding-top: 40px; }
    .main-header h1 { color: var(--primary); font-size: 1.2rem; font-weight: 800; text-transform: uppercase; margin: 0; }
    .card { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    h2 { color: var(--primary); margin: 0 0 15px 0; display: flex; align-items: center; gap: 12px; font-size: 1.1rem; }
    label { font-weight: 600; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; display: block; }
    input[type="date"] { width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 10px; background: var(--bg-input); color: white; outline: none; margin-bottom: 20px; box-sizing: border-box; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    .table-container { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; min-width: 550px; color: var(--text-main); }
    th { background: #252525; color: var(--text-muted); font-size: 0.7rem; padding: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border-color); }
    td { padding: 14px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
    .critical-row { background-color: #3a1c1c !important; color: #ff8a80; }
    .planting-row { color: var(--primary); font-weight: 800; background-color: #1a2e1c !important; }
    .footer { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 30px; padding: 20px 0; border-top: 1px dashed var(--border-color); }
  </style>
</head>
<body>
<a href="https://mamank757.github.io/petani/" class="btn-home" title="Kembali ke Home">🏠</a>
<body>

<div class="container">
<div class="card">
  <div class="main-header">
    <h1>Jadwal Tindakan Pengendalian</h1>
  </div>

  <div class="card">
    <h2><i class="fas fa-calendar-check"></i> Kalender Rekomendasi PPL</h2>
    <label>Rencana Tanggal Tanam:</label>
    <input type="date" id="tglTanam" onchange="generateKalender()">

    <div class="table-container">
      <table>
        <thead><tr><th>Minggu</th><th>Estimasi Tanggal</th><th>Tindakan Rekomendasi PPL</th></tr></thead>
        <tbody id="tabelKalender">
          <tr><td colspan="3" style="text-align:center; color:var(--text-muted);">Pilih tanggal tanam untuk melihat jadwal</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer">© 2026 King Mamank • PPL BPP Bola - Kab. Wajo</div>
</div>

<script>
function generateKalender() {
  const tgl = document.getElementById('tglTanam').value;
  if (!tgl) return;
  const tglObj = new Date(tgl);
  const list = [
    "Gropyokan, Pasang Umpan/Bongkar Lubang Aktif", "Sanitasi Pematang/Saluran Irigasi", "Olah Tanah",
    "PENANAMAN SEREMPAK", "Pasang Trap Barrier System (TBS)", "Monitoring Jejak & Umpan Segar",
    "Fumigasi Sarang (Emposan)", "Sanitasi Gulma Rutin", "WASPADA: Fase Bunting Padi",
    "Pengendalian Intensif (Umpan Beracun)", "Puncak Kerawanan (Lindungi Malai)", "Monitoring Menjelang Panen",
    "PANEN & Bersihkan Sisa Jerami", "Gropyokan Pasca Panen", "Bongkar Habitat Sisa"
  ];

  const tbody = document.getElementById('tabelKalender');
  tbody.innerHTML = '';
  list.forEach((teks, i) => {
    let d = new Date(tglObj); d.setDate(tglObj.getDate() + (i - 3) * 7);
    let row = tbody.insertRow();
    row.insertCell(0).innerHTML = `<b>Mg ${i + 1}</b>`;
    row.insertCell(1).innerText = d.toLocaleDateString('id-ID', {day:'2-digit', month:'long'});
    let c = row.insertCell(2);
    if (teks === "PENANAMAN SEREMPAK") { row.className = 'planting-row'; c.innerHTML = `<i class="fas fa-seedling"></i> ${teks}`; }
    else if (i >= 8 && i <= 10) { row.className = 'critical-row'; c.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${teks}`; }
    else { c.innerText = teks; }
  });
}
</script>
</body>
</html>
